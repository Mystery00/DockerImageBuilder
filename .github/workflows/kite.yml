name: Build Kite
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - kite/**
env:
  DOCKER_NAMESPACE: mystery0
  SERVICE_NAME: kite-mirror
jobs:
  pre-build:
    runs-on: ubuntu-latest
    outputs:
      kite_tag: ${{ env.KITE_TAG }}
    steps:
      - name: github-release-getter
        uses: Mystery00/github-release-getter@v1.3
        id: kite_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repoOwner: kite-org
          repoName: kite
      - run: echo "KITE_TAG=$(echo ${{ steps.kite_release.outputs.tagName }})" >> $GITHUB_ENV

  # Job for AMD64 build
  build-amd64:
    runs-on: ubuntu-24.04
    needs: pre-build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: kite
          platforms: linux/amd64
          build-args: |
            KITE_VERSION=${{ needs.pre-build.outputs.kite_tag }}
          file: kite/Dockerfile
          push: true
          # Push to a unique architecture-specific tag first
          tags: ${{ env.DOCKER_NAMESPACE }}/${{ env.SERVICE_NAME }}:${{ needs.pre-build.outputs.kite_tag }}-amd64

  # Job for ARM64 build
  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: pre-build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: kite
          platforms: linux/arm64
          build-args: |
            KITE_VERSION=${{ needs.pre-build.outputs.kite_tag }}
          file: kite/Dockerfile
          push: true
          # Push to a unique architecture-specific tag first
          tags: ${{ env.DOCKER_NAMESPACE }}/${{ env.SERVICE_NAME }}:${{ needs.pre-build.outputs.kite_tag }}-arm64

  publish-manifest:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Gather Image Tags
        id: meta
        run: echo "TAGS=${{ env.DOCKER_NAMESPACE }}/${{ env.SERVICE_NAME }}:${{ needs.pre-build.outputs.kite_tag }}" >> $GITHUB_OUTPUT

      - name: Create and Push Manifest List
        run: |
          docker buildx imagetools create --tag ${{ steps.meta.outputs.TAGS }} \
            ${{ steps.meta.outputs.TAGS }}-amd64 \
            ${{ steps.meta.outputs.TAGS }}-arm64